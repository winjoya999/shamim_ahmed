<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facebook Profile</title>

    <style>
        body { background: #1c1e21; color: white; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        
        /* Profile Card Styling */
        .profile-container { width: 100%; max-width: 400px; background: #242526; border-radius: 8px; overflow: hidden; position: relative; filter: blur(20px); transition: filter 0.5s ease; }
        
        .cover-photo { width: 100%; height: 150px; background: #333; object-fit: cover; }
        .profile-pic-container { position: absolute; top: 100px; left: 20px; border: 4px solid #242526; border-radius: 50%; overflow: hidden; width: 100px; height: 100px; background: #333; }
        .profile-pic { width: 100%; height: 100%; object-fit: cover; }
        
        .profile-info { padding: 60px 20px 20px; }
        .name { font-size: 24px; font-weight: bold; margin: 0; }
        .stats { color: #b0b3b8; font-size: 14px; margin-top: 5px; }
        
        /* Action Button */
        .btn-group { display: flex; gap: 10px; margin-top: 20px; }
        .btn-blue { background: #0866ff; color: white; border: none; padding: 8px 15px; border-radius: 6px; font-weight: bold; flex: 1; cursor: pointer; }
        .btn-gray { background: #3a3b3c; color: white; border: none; padding: 8px 15px; border-radius: 6px; font-weight: bold; flex: 1; }
